<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprite Viewer — Number Munchers Dev Tool</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        display: flex;
        flex-direction: row;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #sidebar {
        width: 280px;
        min-width: 280px;
        background-color: #16213e;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #2a3a5e;
        overflow: hidden;
      }

      #sidebar-header {
        padding: 16px 12px 12px;
        font-size: 16px;
        font-weight: 600;
        color: #e0e0e0;
        border-bottom: 1px solid #2a3a5e;
        background-color: #0f3460;
        letter-spacing: 0.5px;
      }

      #sprite-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      #sprite-list::-webkit-scrollbar {
        width: 6px;
      }

      #sprite-list::-webkit-scrollbar-track {
        background: #16213e;
      }

      #sprite-list::-webkit-scrollbar-thumb {
        background: #2a3a5e;
        border-radius: 3px;
      }

      .section-header {
        padding: 8px 12px 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-top: 4px;
      }

      .sprite-item {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        margin: 2px 6px;
        transition: background-color 0.1s;
        gap: 8px;
      }

      .sprite-item:hover {
        background-color: #1e3a5f;
      }

      .sprite-item.selected {
        background-color: #2a4a6f;
      }

      .sprite-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #444;
        flex-shrink: 0;
      }

      .sprite-dot.has-png {
        background-color: #4caf50;
      }

      .sprite-name {
        color: #e0e0e0;
        flex: 1;
      }

      #metadata-panel {
        padding: 12px;
        border-top: 1px solid #2a3a5e;
        border-bottom: 1px solid #2a3a5e;
        background-color: #12183a;
      }

      #metadata-panel .meta-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 8px;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        gap: 8px;
      }

      .meta-label {
        color: #888;
        font-size: 12px;
      }

      .meta-value {
        color: #e0e0e0;
        font-size: 12px;
        text-align: right;
      }

      #controls {
        padding: 12px;
        color: #e0e0e0;
        font-size: 12px;
        overflow-y: auto;
        flex: 1;
      }

      .controls-section {
        margin-bottom: 16px;
      }

      .controls-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 8px;
      }

      .controls-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        flex-wrap: wrap;
      }

      .ctrl-input {
        background: #0d1b2a;
        border: 1px solid #2a4a6f;
        color: #e0e0e0;
        padding: 4px 6px;
        border-radius: 4px;
        font-size: 12px;
      }

      .ctrl-input[type="number"] {
        width: 60px;
      }

      .ctrl-input[type="range"] {
        width: 100%;
      }

      .ctrl-btn {
        background: #2a4a6f;
        border: none;
        color: #e0e0e0;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: background-color 0.1s;
      }

      .ctrl-btn:hover {
        background: #3a5a8f;
      }

      .ctrl-btn.btn-commit {
        background: #2d6a4f;
        width: 100%;
        padding: 8px;
        font-size: 13px;
      }

      .ctrl-btn.btn-commit:hover {
        background: #40916c;
      }

      .ctrl-btn.btn-commit:disabled {
        background: #1a3a2f;
        color: #888;
        cursor: not-allowed;
      }

      .ctrl-label {
        color: #aaa;
        font-size: 12px;
        flex-shrink: 0;
      }

      #frame-counter {
        font-size: 13px;
        color: #e0e0e0;
        text-align: center;
        padding: 4px 0;
        letter-spacing: 1px;
      }

      #defined-ranges {
        font-size: 12px;
        color: #aaa;
        margin-top: 6px;
      }

      #defined-ranges > div {
        padding: 3px 6px;
        background: #12183a;
        border-radius: 3px;
        margin-bottom: 4px;
      }

      #commit-status {
        font-size: 12px;
        margin-top: 6px;
        min-height: 16px;
      }

      #commit-status.success {
        color: #52b788;
      }

      #commit-status.error {
        color: #e07070;
      }

      #canvas-container {
        flex: 1;
        background-color: #1a1a2e;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #canvas-container canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #canvas-container.dragover {
        border: 2px dashed #4a8eff;
        background-color: #1a2a4e;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div id="sidebar-header">Sprite Viewer</div>
      <div id="sprite-list"></div>
      <div id="metadata-panel">
        <div class="meta-title">Metadata</div>
        <div id="metadata-content" style="color: #555; font-size: 12px;">No sprite selected</div>
      </div>
      <div id="controls">
        <!-- File loading section -->
        <div class="controls-section">
          <div class="controls-label">Load Sprite</div>
          <div class="controls-row">
            <span class="ctrl-label">Frame W</span>
            <input id="frame-width" class="ctrl-input" type="number" value="64" min="1" max="512" />
            <span class="ctrl-label">Frame H</span>
            <input id="frame-height" class="ctrl-input" type="number" value="64" min="1" max="512" />
          </div>
          <div class="controls-row">
            <button id="btn-file-pick" class="ctrl-btn" style="width:100%">Load PNG...</button>
          </div>
          <div style="font-size:11px;color:#555;margin-top:4px;">Or drag a PNG onto the canvas</div>
        </div>

        <!-- Transport controls -->
        <div class="controls-section">
          <div class="controls-label">Playback</div>
          <div class="controls-row">
            <button id="btn-step-back" class="ctrl-btn">&#9197;</button>
            <button id="btn-play" class="ctrl-btn">&#9654;</button>
            <button id="btn-pause" class="ctrl-btn">&#9646;&#9646;</button>
            <button id="btn-step-fwd" class="ctrl-btn">&#9198;</button>
          </div>
          <div class="controls-row" style="gap:6px;align-items:center;">
            <span class="ctrl-label">Speed</span>
            <input id="speed-slider" class="ctrl-input" type="range" min="1" max="30" value="8" step="1" />
            <span id="speed-value" style="color:#e0e0e0;font-size:12px;flex-shrink:0;width:42px;text-align:right;">8 fps</span>
          </div>
          <div id="frame-counter">- / -</div>
        </div>

        <!-- Animation range section -->
        <div class="controls-section">
          <div class="controls-label">Define Range</div>
          <div class="controls-row">
            <span class="ctrl-label">Name</span>
            <input id="range-name" class="ctrl-input" type="text" placeholder="e.g. idle" style="flex:1" />
          </div>
          <div class="controls-row">
            <span class="ctrl-label">Start</span>
            <input id="range-start" class="ctrl-input" type="number" value="0" min="0" style="width:50px" />
            <span class="ctrl-label">End</span>
            <input id="range-end" class="ctrl-input" type="number" value="0" min="0" style="width:50px" />
          </div>
          <div class="controls-row">
            <button id="btn-create-range" class="ctrl-btn" style="width:100%">Create Range</button>
          </div>
          <div id="defined-ranges"></div>
        </div>

        <!-- Commit to project section -->
        <div class="controls-section">
          <div class="controls-label">Commit to Project</div>
          <div class="controls-row">
            <input id="commit-name" class="ctrl-input" type="text" placeholder="e.g. warrior" style="flex:1" />
          </div>
          <button id="btn-commit" class="ctrl-btn btn-commit">Commit to Project</button>
          <div id="commit-status"></div>
        </div>
      </div>
    </div>
    <div id="canvas-container"></div>
    <script type="module" src="/src/viewer/main.ts"></script>
  </body>
</html>
